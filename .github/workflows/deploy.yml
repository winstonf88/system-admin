name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com/site-admin

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push backend
        run: |
          docker build -t $REGISTRY/backend:${{ github.ref_name }} ./backend
          docker push $REGISTRY/backend:${{ github.ref_name }}

      - name: Build and push frontend
        run: |
          docker build -t $REGISTRY/frontend:${{ github.ref_name }} ./frontend
          docker push $REGISTRY/frontend:${{ github.ref_name }}

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: REGISTRY,GITHUB_REF_NAME
          script: |
            doctl registry login --expiry-seconds 600

            export TAG=${{ github.ref_name }}

            cd /app

            docker compose pull

            # Run migrations before restarting backend
            docker compose run --rm site-admin-api uv run aerich upgrade

            docker compose up -d --remove-orphans
