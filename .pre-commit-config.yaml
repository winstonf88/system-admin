repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: biome
        name: biome check
        language: system
        entry: bash
        args:
          - -c
          - >-
            cd frontend && files=();
            for f in "$@"; do files+=("${f#frontend/}"); done &&
            exec pnpm exec biome check --write "${files[@]}"
          - bash
        types_or: [javascript, jsx, ts, tsx, json]
        files: ^frontend/
