name: site-admin
region: nyc

databases:
  - cluster_name: dbaas-db-1181612
    db_name: defaultdb
    db_user: doadmin
    engine: PG
    name: dbaas-db-1181612
    production: true
    version: "18"

ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
    - component:
        name: api
      match:
        path:
          prefix: /api

services:
  - name: api
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    github:
      repo: winstonf88/system-admin
      branch: main
      deploy_on_push: false
    http_port: 8000
    instance_size_slug: basic-xxs
    instance_count: 1
    health_check:
      http_path: /api/health
    run_command: uv run aerich upgrade && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    envs:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_ENABLE_ADMIN
        value: "true"
      - key: APP_EXPOSE_DOCS
        value: "false"
      - key: STORAGE_BACKEND
        value: spaces
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: APP_CORS_ORIGINS
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SPACES_REGION
        value: nyc3
      - key: SPACES_BUCKET
        value: site-admin-assets
      - key: SPACES_CDN_ENDPOINT
        value: https://site-admin-assets.nyc3.cdn.digitaloceanspaces.com

  - name: web
    dockerfile_path: frontend/Dockerfile
    source_dir: frontend
    github:
      repo: winstonf88/system-admin
      branch: main
      deploy_on_push: false
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    health_check:
      http_path: /
    envs:
      - key: NEXT_PUBLIC_API_URL
        value: /api
        scope: BUILD_TIME
      - key: API_URL
        value: ${api.PRIVATE_URL}
        scope: RUN_TIME
      - key: COOKIE_SECURE
        value: "true"
        scope: RUN_TIME
